name: Deploy to HuggingFace

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "mostafa.ahmed.abuhamed@gmail.com"
          git config --global user.name "MostafaAbuHamed"
          git push https://MostafaAbuHamed:$HF_TOKEN@huggingface.co/spaces/Mostafa-AbuHamed/IRS-AI main --force
